# /etc/nginx/sites-available/testing.unotrips.com
#
# Install:
#   sudo cp /var/www/testing-unotrips-crm/deploy/nginx/testing.unotrips.com.conf \
#           /etc/nginx/sites-available/testing.unotrips.com
#   sudo ln -sf /etc/nginx/sites-available/testing.unotrips.com /etc/nginx/sites-enabled/
#   sudo nginx -t && sudo systemctl reload nginx
#
# SSL (after DNS points to this VPS):
#   sudo certbot --nginx -d testing.unotrips.com
# Certbot will add ssl_certificate lines to this file automatically.

# Redirect HTTP → HTTPS (enable after SSL is issued; until then, use testing.unotrips.com.http-only.conf)
server {
    listen 80;
    listen [::]:80;
    server_name testing.unotrips.com;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
        allow all;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name testing.unotrips.com;

    # Certbot fills these paths after: sudo certbot --nginx -d testing.unotrips.com
    ssl_certificate     /etc/letsencrypt/live/testing.unotrips.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/testing.unotrips.com/privkey.pem;
    include             /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam         /etc/letsencrypt/ssl-dhparams.pem;

    root /var/www/testing-unotrips-crm/frontend/dist;
    index index.html;

    client_max_body_size 20M;
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_comp_level 5;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript image/svg+xml font/woff2;

    # Socket.IO → same Node process (real-time notifications)
    location /socket.io/ {
        proxy_pass http://127.0.0.1:5000/socket.io/;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 86400s;
        proxy_send_timeout 86400s;
    }

    # API → Node.js (port 5000)
    location /api/ {
        proxy_pass http://127.0.0.1:5000/api/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_cache_bypass $http_upgrade;
        proxy_read_timeout 90s;
    }

    # React SPA
    location / {
        try_files $uri $uri/ /index.html;
    }

    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|webp)$ {
        expires 30d;
        add_header Cache-Control "public, immutable";
        access_log off;
        try_files $uri =404;
    }
}
