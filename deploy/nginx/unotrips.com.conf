# /etc/nginx/sites-available/unotrips.com
# Main site: static export in public_html (Next.js SSR optional on :3000)

server {
    listen 80;
    listen [::]:80;
    server_name unotrips.com www.unotrips.com;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name unotrips.com www.unotrips.com;

    ssl_certificate /etc/letsencrypt/live/unotrips.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/unotrips.com/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    client_max_body_size 20M;
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml;

    root /var/www/unotrips.com/public_html;
    index index.html;

    # Meta landing pages (PHP)
    location = /meta/arunachal {
        return 301 /meta/arunachal/;
    }
    location ^~ /meta/arunachal/ {
        alias /var/www/unotrips-meta/arunachal/;
        index index.php index.html;
        try_files $uri $uri/ @meta_arunachal_php;

        location ~ \.php$ {
            include fastcgi_params;
            fastcgi_pass unix:/run/php/php8.3-fpm.sock;
            fastcgi_param SCRIPT_FILENAME $request_filename;
        }
    }
    location @meta_arunachal_php {
        include fastcgi_params;
        fastcgi_pass unix:/run/php/php8.3-fpm.sock;
        fastcgi_param SCRIPT_FILENAME /var/www/unotrips-meta/arunachal/index.php;
        fastcgi_param SCRIPT_NAME /meta/arunachal/index.php;
        fastcgi_param REQUEST_URI $request_uri;
    }

    location = /meta/himachal_special {
        return 301 /meta/himachal_special/;
    }
    location ^~ /meta/himachal_special/ {
        alias /var/www/unotrips-meta/himachal_special/;
        index index.php index.html;
        try_files $uri $uri/ @meta_himachal_php;

        location ~ \.php$ {
            include fastcgi_params;
            fastcgi_pass unix:/run/php/php8.3-fpm.sock;
            fastcgi_param SCRIPT_FILENAME $request_filename;
        }
    }
    location @meta_himachal_php {
        include fastcgi_params;
        fastcgi_pass unix:/run/php/php8.3-fpm.sock;
        fastcgi_param SCRIPT_FILENAME /var/www/unotrips-meta/himachal_special/index.php;
        fastcgi_param SCRIPT_NAME /meta/himachal_special/index.php;
        fastcgi_param REQUEST_URI $request_uri;
    }

    location = /meta/leh {
        return 301 /meta/leh/;
    }
    location ^~ /meta/leh/ {
        alias /var/www/unotrips-meta/leh/;
        try_files $uri $uri.html $uri/ /meta/leh/index.html;
    }

    location = /meta/leh_tour_package {
        return 301 /meta/leh_tour_package/;
    }
    location ^~ /meta/leh_tour_package/ {
        alias /var/www/unotrips-meta/leh_tour_package/;
        try_files $uri $uri.html $uri/ /meta/leh_tour_package/index.html;
    }

    # Static Next export (_next assets, html pages)
    location /_next/ {
        try_files $uri =404;
        expires 7d;
        add_header Cache-Control "public, immutable";
    }

    location /api/ {
        try_files $uri $uri/ =404;
    }

    # SPA / static HTML export
    location / {
        try_files $uri $uri.html $uri/ /index.html;
    }

    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|webp|woff|woff2|txt|xml)$ {
        try_files $uri =404;
        expires 7d;
        add_header Cache-Control "public, immutable";
    }
}
