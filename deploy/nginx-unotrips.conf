# DEPRECATED — use deploy/nginx/testing.unotrips.com.conf
# /etc/nginx/sites-available/testing.unotrips.com
# Symlink: sudo ln -s .../testing.unotrips.com /etc/nginx/sites-enabled/

server {
    listen 80;
    server_name testing.unotrips.com;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    server_name testing.unotrips.com;

    # ssl_certificate /etc/letsencrypt/live/testing.unotrips.com/fullchain.pem;
    # ssl_certificate_key /etc/letsencrypt/live/testing.unotrips.com/privkey.pem;

    root /var/www/unotravel-crm/frontend/dist;
    index index.html;

    client_max_body_size 20M;

    location /api/ {
        proxy_pass http://127.0.0.1:5000/api/;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }
}
